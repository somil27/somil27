<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Footer Banner</title>
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="50%" stop-color="#12072a"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="fglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="30%" stop-color="#A78BFA" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </linearGradient>
    <filter id="fblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="900" height="120" fill="url(#fbg)"/>
  <ellipse cx="450" cy="60" rx="350" ry="50" fill="url(#fglow)" filter="url(#fblur)"/>

  <line x1="0" y1="0" x2="900" y2="0" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="100" y="38" width="700" height="1" fill="url(#flineGrad)"/>

  <text x="450" y="66" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" text-anchor="middle" fill="#8B5CF6" fill-opacity="0.9" letter-spacing="1" font-style="italic">Good code is not written overnight — it is refined through curiosity, consistency,</text>
  <text x="450" y="84" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" text-anchor="middle" fill="#8B5CF6" fill-opacity="0.9" letter-spacing="1" font-style="italic">and a genuine love for building things that work.</text>

  <line x1="0" y1="119" x2="900" y2="119" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.4"/>
</svg>
